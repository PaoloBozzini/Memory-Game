<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Danish Memory Game</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css"
    />
    <link rel="stylesheet" href="styles.css" />
      <link rel="stylesheet" href="win-message.css" />
    <link rel="stylesheet" href="restart-button.css" />
  </head>

  <body>
    <!-- Header -->
    <header class="header">
      <h1>ReMi Dansk</h1>
    </header>
    <main>
    <!-- Stats -->
    <section class="stats">
      <div class="stat-box">
        <span class="stat-label">Reveals:</span>
        <span id="reveals">0</span>
      </div>

      <div class="stat-box">
        <span class="stat-label">Time:</span>
        <span id="timer">00:00</span>
      </div>
    </section>

    <!-- One Card  Test-->
    <!-- Game Board -->
<section class="game-board" id="card-grid">

  

</section>

    

    <!-- Restart Button -->
    <button id="restartButton" class="restart-button" onclick="restartGame(gameState)">
      <span class="icon">⟳</span> Restart
    </button>
<button id="win-btn">win </button>
    
</main>
    <footer class="footer">
      <p>&copy; ReMi Studios. All rights reserved.</p>
      </footer>
    <!-- Scripts -->
    

    <div id="win-message" class="win-message hidden">
      <div class="win-content">
        <h2 class="win-title">🎉 Congratulations!🎉</h2>
        <h3 class="win-subtitle">You have matched all the cards!</h3>
               <p class="score-text">Your Time: <span id="finalScore">0</span></p>
        <p class="score-text">Your Reveals: <span id="finalReveals">0</span></p>
        <button id="play-again-btn">Play Again</button>
       
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
