<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Danish Memory Game</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700&family=Fredoka:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="css/layout.css" />
    <link rel="stylesheet" href="css/card-grid.css" />
    <link rel="stylesheet" href="css/button.css" />
    <link rel="stylesheet" href="css/stats.css" />
    <link rel="stylesheet" href="css/win-message.css" />
    <link rel="stylesheet" href="css/key-frames.css" />
    <link rel="stylesheet" href="typography.css"/>
  </head>

  <body>
    <main>
      <!-- Header -->
      <header class="header">
        <h1>ReMi Dansk</h1>
      </header>

      <!-- Stats -->
      <section class="stats">
        <div class="stat-box">
          <span class="stat-label">Reveals:&nbsp; </span>
          <span id="reveals">0</span>
        </div>

        <div class="stat-box">
          <span class="stat-label">Time: &nbsp;</span>
          <span id="timer">00:00</span>
        </div>
        <div id="message" class="message"></div>
      </section>

      <!-- Game Board -->

      <section class="game-board" id="card-grid"></section>

      <!-- Restart Button -->
      <button id="restartButton" class="game-button restart-button">
        <span class="icon">⟳</span> Restart&nbsp;
      </button>
    </main>

    <!-- Win button -->

    <div id="win-message" class="win-message hidden">
      <div class="win-content">
        <h2 class="win-title">🎉 Congratulations!🎉</h2>
        <p class="win-subtitle">You have matched all the cards!</p>
        <p class="score-text">Your Time: <span id="finalScore">0</span></p>
        <p class="score-text">Your Reveals: <span id="finalReveals">0</span></p>
        <button id="play-again-button" class="game-button play-again-button">Play Again</button>
      </div>
    </div>

    <!-- Scripts -->

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
